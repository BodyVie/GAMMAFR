<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Hub de la traduction française du modpack S.T.A.L.K.E.R. G.A.M.M.A.">
  <title>GAMMA · Traduction FR</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===================== BARRE DE STATUT PDA ===================== -->
  <header class="statusbar">
    <div class="statusbar__inner">
      <div class="brand">
        <span class="brand__glyph" aria-hidden="true">&#9762;</span>
        <span class="brand__text">
          <span class="brand__title" id="brandTitle">GAMMAFR</span>
          <span class="brand__tag" id="brandTag">Localisation française du modpack</span>
        </span>
      </div>

      <nav class="nav" aria-label="Navigation principale">
        <button class="nav__btn is-active" data-tab="files">Files</button>
        <button class="nav__btn" data-tab="liste">Liste</button>
        <button class="nav__btn" data-tab="changelog">Changelog</button>
        <button class="nav__btn" data-tab="contact">Contact</button>
        <span class="nav__sep" aria-hidden="true"></span>
        <button class="nav__btn nav__btn--admin" data-tab="admin">Admin</button>
      </nav>
    </div>
    <div class="hazard" aria-hidden="true"></div>
  </header>

  <main class="wrap">

    <!-- ===================== FILES ===================== -->
    <section class="panel is-active" id="panel-files" aria-label="Files">
      <div class="stencil">Lisez-moi</div>
      <div class="briefing" id="briefing"><span class="loading">Chargement&#8230;</span></div>

      <div class="stencil">Configurateur d'installation</div>
      <div class="wizard" id="wizard"><span class="loading">Chargement&#8230;</span></div>
    </section>

    <!-- ===================== LISTE ===================== -->
    <section class="panel" id="panel-liste" aria-label="Liste">
      <div class="stencil">Fichiers traduits</div>
      <div id="listeHost"><span class="loading">Chargement&#8230;</span></div>
    </section>

    <!-- ===================== CHANGELOG ===================== -->
    <section class="panel" id="panel-changelog" aria-label="Changelog">
      <div class="stencil">Journal des versions</div>
      <div id="logHost"><span class="loading">Chargement&#8230;</span></div>
    </section>

    <!-- ===================== CONTACT ===================== -->
    <section class="panel" id="panel-contact" aria-label="Contact">
      <div class="stencil">Prendre contact</div>
      <div class="card contact">
        <label class="field">
          <span class="field__label">Nom</span>
          <input class="input" id="cName" type="text" placeholder="Ton pseudo de stalker" autocomplete="name">
        </label>
        <label class="field">
          <span class="field__label">Email</span>
          <input class="input" id="cEmail" type="email" placeholder="toi@exemple.fr" autocomplete="email">
        </label>
        <label class="field">
          <span class="field__label">Message</span>
          <textarea class="textarea" id="cMessage" rows="6" placeholder="Bug de traduction, suggestion, demande&#8230;"></textarea>
        </label>
        <button class="btn" id="contactSend">Envoyer le message</button>
        <div class="notice" id="contactNotice" role="status"></div>
      </div>
    </section>

    <!-- ===================== ADMIN ===================== -->
    <section class="panel" id="panel-admin" aria-label="Admin">
      <div class="stencil stencil--muted">Accès restreint</div>
      <div id="adminRoot"><span class="loading">Chargement&#8230;</span></div>
    </section>

  </main>

  <script src="js/zip.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
