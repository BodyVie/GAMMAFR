<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Hub de la traduction française du modpack S.T.A.L.K.E.R. G.A.M.M.A. : configurateur d'installation, changelog et planificateur.">
  <title>GAMMA · Traduction FR</title>

  <!-- Icônes -->
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="theme-color" content="#0c0e13">

  <!-- Partage social (Open Graph / Twitter).
       NOTE : ces URL de base sont resynchronisées au chargement par js/app.js
       (syncShareMeta) à partir de l'URL réelle du site — inutile de les éditer en
       cas de changement de domaine/chemin. Elles restent ici comme repli pour les
       robots qui n'exécutent pas JavaScript. -->
  <link rel="canonical" href="https://bodyvie.github.io/GAMMAFR/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="GAMMA.FR">
  <meta property="og:locale" content="fr_FR">
  <meta property="og:title" content="GAMMA · Traduction FR">
  <meta property="og:description" content="Hub de la traduction française du modpack S.T.A.L.K.E.R. G.A.M.M.A. : configurateur d'installation, changelog et planificateur.">
  <meta property="og:url" content="https://bodyvie.github.io/GAMMAFR/">
  <meta property="og:image" content="https://bodyvie.github.io/GAMMAFR/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="GAMMA.FR — localisation française du modpack S.T.A.L.K.E.R. G.A.M.M.A.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="GAMMA · Traduction FR">
  <meta name="twitter:description" content="Hub de la traduction française du modpack S.T.A.L.K.E.R. G.A.M.M.A. : configurateur d'installation, changelog et planificateur.">
  <meta name="twitter:image" content="https://bodyvie.github.io/GAMMAFR/assets/og-image.png">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===================== BARRE DE STATUT PDA ===================== -->
  <header class="statusbar">
    <div class="statusbar__inner">
      <div class="brand">
        <span class="brand__glyph" aria-hidden="true">&#9762;</span>
        <span class="brand__text">
          <span class="brand__title" id="brandTitle">GAMMAFR</span>
          <span class="brand__tag" id="brandTag">Localisation française du modpack</span>
        </span>
      </div>

      <nav class="nav" role="tablist" aria-label="Sections du site">
        <button class="nav__btn is-active" id="tab-board" data-tab="board" role="tab" aria-selected="true" aria-controls="panel-board" tabindex="0">Panneau d'affichage</button>
        <button class="nav__btn" id="tab-files" data-tab="files" role="tab" aria-selected="false" aria-controls="panel-files" tabindex="-1">Files</button>
        <button class="nav__btn" id="tab-liste" data-tab="liste" role="tab" aria-selected="false" aria-controls="panel-liste" tabindex="-1">Liste</button>
        <button class="nav__btn" id="tab-changelog" data-tab="changelog" role="tab" aria-selected="false" aria-controls="panel-changelog" tabindex="-1">Changelog</button>
        <button class="nav__btn" id="tab-planner" data-tab="planner" role="tab" aria-selected="false" aria-controls="panel-planner" tabindex="-1">Planner</button>
        <button class="nav__btn" id="tab-contact" data-tab="contact" role="tab" aria-selected="false" aria-controls="panel-contact" tabindex="-1">Contact</button>
        <span class="nav__sep" aria-hidden="true"></span>
        <button class="nav__btn nav__btn--admin" id="tab-admin" data-tab="admin" role="tab" aria-selected="false" aria-controls="panel-admin" tabindex="-1">Admin</button>
        <span class="nav__presence" id="adminCount" role="status" aria-live="polite" hidden></span>
        <span class="nav__editing" id="adminEditing" title="Un administrateur est en train d'éditer" hidden>&#9888; édition</span>
      </nav>
    </div>
    <div class="hazard" aria-hidden="true"></div>
  </header>

  <main class="wrap">

    <!-- ===================== PANNEAU D'AFFICHAGE (accueil) ===================== -->
    <section class="panel is-active" id="panel-board" role="tabpanel" aria-labelledby="tab-board">
      <div class="stencil">Panneau d'affichage</div>
      <div id="boardHost"><span class="loading">Chargement&#8230;</span></div>
    </section>

    <!-- ===================== FILES ===================== -->
    <section class="panel" id="panel-files" role="tabpanel" aria-labelledby="tab-files">
      <div class="stencil">Lisez-moi</div>
      <div class="briefing" id="briefing"><span class="loading">Chargement&#8230;</span></div>

      <div class="stencil">Configurateur d'installation</div>
      <div class="wizard" id="wizard"><span class="loading">Chargement&#8230;</span></div>
    </section>

    <!-- ===================== LISTE ===================== -->
    <section class="panel" id="panel-liste" role="tabpanel" aria-labelledby="tab-liste">
      <div class="stencil">Fichiers traduits</div>
      <div id="listeHost"><span class="loading">Chargement&#8230;</span></div>
    </section>

    <!-- ===================== CHANGELOG ===================== -->
    <section class="panel" id="panel-changelog" role="tabpanel" aria-labelledby="tab-changelog">
      <div class="stencil">Journal des versions</div>
      <div id="logHost"><span class="loading">Chargement&#8230;</span></div>
    </section>

    <!-- ===================== PLANNER ===================== -->
    <section class="panel" id="panel-planner" role="tabpanel" aria-labelledby="tab-planner">
      <div class="stencil">Planificateur</div>
      <div id="plannerHost"><span class="loading">Chargement&#8230;</span></div>
    </section>

    <!-- ===================== CONTACT ===================== -->
    <section class="panel" id="panel-contact" role="tabpanel" aria-labelledby="tab-contact">
      <div class="stencil">Prendre contact</div>
      <div class="card contact">
        <!-- Honeypot anti-spam : invisible pour les humains, rempli par les bots. -->
        <div class="hp" aria-hidden="true">
          <label>Ne pas remplir ce champ
            <input type="text" id="cWebsite" name="website" tabindex="-1" autocomplete="off">
          </label>
        </div>
        <label class="field">
          <span class="field__label">Pseudo <span class="field__opt">(facultatif)</span></span>
          <input class="input" id="cName" type="text" placeholder="Ton pseudo" autocomplete="off">
        </label>
        <label class="field">
          <span class="field__label">Motif</span>
          <select class="input select" id="cMotif">
            <option value="Suggestion">Suggestion</option>
            <option value="Correction">Correction</option>
            <option value="Autre">Autre</option>
          </select>
        </label>
        <label class="field">
          <span class="field__label">Objet</span>
          <input class="input" id="cObjet" type="text" placeholder="Résumé en quelques mots" maxlength="200">
        </label>
        <label class="field">
          <span class="field__label">Message</span>
          <textarea class="textarea" id="cMessage" rows="6" placeholder="Décris ta suggestion ou la correction&#8230;" maxlength="5000"></textarea>
        </label>
        <button class="btn" id="contactSend">Envoyer</button>
        <div class="notice" id="contactNotice" role="status"></div>
      </div>
    </section>

    <!-- ===================== ADMIN ===================== -->
    <section class="panel" id="panel-admin" role="tabpanel" aria-labelledby="tab-admin">
      <div class="stencil stencil--muted">Accès restreint</div>
      <div id="adminRoot"><span class="loading">Chargement&#8230;</span></div>
    </section>

  </main>

  <script src="js/core.js"></script>
  <script src="js/zip.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
