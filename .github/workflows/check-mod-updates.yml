name: Vérification des mises à jour ModDB

on:
  schedule:
    - cron: '0 8 */2 * *'  # Tous les 2 jours à 8h UTC
  workflow_dispatch:       # Déclenchement manuel depuis l'interface GitHub
  repository_dispatch:     # Déclenchement manuel depuis le site (bouton admin via le Worker)
    types: [scan-mod-updates]

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests beautifulsoup4

      - name: Vérifier les mises à jour ModDB
        run: python3 .github/scripts/check_updates.py

      - name: Commiter si modifié
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mod_updates.json
          git diff --staged --quiet || git commit -m "chore: mise à jour automatique mod_updates.json [skip ci]"
          git push
