name: Tests

# Lance les tests unitaires (runner natif Node, sans dépendance).

on:
  push:
    branches: [ main ]
    paths:
      - 'js/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/test.yml'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: node --test
        run: node --test
